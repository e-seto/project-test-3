<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* ── home-only overrides ── */
        body {
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* home navbar */
        .home-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 48px;
            padding: 32px 0;
        }

        .home-nav a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-dim);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .home-nav a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        /* hero */
        .hero {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 0;
        }

        /* label above title */
        .hero-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.35em;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.9s ease forwards 0.3s;
        }

        /* main title */
        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(52px, 8vw, 110px);
            font-weight: 700;
            line-height: 0.95;
            text-align: center;
            letter-spacing: -0.01em;
            color: var(--text-bright);
            margin: 0;
        }

        .hero-title .line {
            display: block;
            overflow: hidden;
        }

        .hero-title .line span {
            display: block;
            opacity: 0;
            transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero-title .line:nth-child(1) span { animation-delay: 0.5s; }
        .hero-title .line:nth-child(2) span { animation-delay: 0.65s; }
        .hero-title .line:nth-child(3) span {
            animation-delay: 0.8s;
            color: transparent;
            -webkit-text-stroke: 1px var(--neon-blue);
            text-shadow: none;
            filter: drop-shadow(0 0 12px var(--neon-blue));
        }

        /* subtitle */
        .hero-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-align: center;
            margin-top: 36px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.1s;
            line-height: 2;
        }

        /* enter button */
        .hero-enter {
            margin-top: 52px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.4s;
        }

        .hero-enter a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 14px 36px;
            border-radius: 3px;
            display: inline-block;
            text-shadow: 0 0 10px var(--accent);
            box-shadow: 0 0 16px rgba(255,133,82,0.15), inset 0 0 16px rgba(255,133,82,0.05);
            transition: all 0.3s ease;
        }

        .hero-enter a:hover {
            background: rgba(255, 133, 82, 0.1);
            box-shadow: 0 0 28px rgba(255,133,82,0.35), inset 0 0 20px rgba(255,133,82,0.08);
            transform: scale(1.03);
        }

        /* bottom status bar */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.7s;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 6px var(--neon-green);
            margin-right: 8px;
            animation: statusPulse 2s ease-in-out infinite;
        }

        /* scroll indicator */
        .scroll-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 2s;
        }

        .scroll-hint span {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--neon-blue), transparent);
            animation: scrollDrop 1.5s ease-in-out infinite;
        }

        /* glitch effect on FRAUD word */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            color: transparent;
            -webkit-text-stroke: 1px var(--neon-blue);
        }

        .glitch::before {
            animation: glitch1 3.5s infinite;
            clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
            color: var(--neon-red);
            -webkit-text-stroke: 0;
            opacity: 0.6;
        }

        .glitch::after {
            animation: glitch2 3.5s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
            color: var(--neon-cyan);
            -webkit-text-stroke: 0;
            opacity: 0.4;
        }

        /* ── keyframes ── */
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        @keyframes scrollDrop {
            0%   { transform: scaleY(0); transform-origin: top; opacity: 0; }
            50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
            100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
        }

        @keyframes glitch1 {
            0%, 90%, 100% { transform: translate(0); }
            92%           { transform: translate(-3px, 1px); }
            94%           { transform: translate(3px, -1px); }
            96%           { transform: translate(-2px, 0); }
        }

        @keyframes glitch2 {
            0%, 90%, 100% { transform: translate(0); }
            91%           { transform: translate(3px, 1px); }
            93%           { transform: translate(-3px, -1px); }
            95%           { transform: translate(2px, 0); }
        }
    </style>
</head>
<body>

    <!-- nav -->
    <nav class="home-nav">
        <a href="/">Home</a>
        <a href="/descriptive">Descriptive</a>
        <a href="/predictive">Predictive</a>
        <a href="/prescriptive">Prescriptive</a>
    </nav>

    <!-- hero -->
    <section class="hero">

        <p class="hero-label">[ Real-time Transaction Analysis ]</p>

        <h1 class="hero-title">
            <span class="line"><span>CREDIT CARD</span></span>
            <span class="line"><span>FRAUD</span></span>
            <span class="line"><span class="glitch" data-text="DETECTION">DETECTION</span></span>
        </h1>

        <p class="hero-sub">
            XGBoost · Machine Learning · Live Inference
        </p>

        <div class="hero-enter">
            <a href="/predictive">RUN ANALYSIS →</a>
        </div>

    </section>

    <!-- status bar -->
    <div class="status-bar">
        <span><span class="status-dot"></span>MODEL ONLINE</span>
        <span>INTD491 · CREDIT CARD FRAUD DETECTION DEMO</span>
        <span>XGBoost Pipeline · v1.0</span>
    </div>

</body>
</html>
